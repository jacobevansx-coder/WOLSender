<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WOL Sender</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="panel" aria-labelledby="title">
        <header class="panel-header">
          <div>
            <p class="eyebrow">Wake on LAN</p>
            <h1 id="title">WOL Sender</h1>
          </div>
          <span id="interface-count" class="status-pill">Interfaces</span>
        </header>

        <form id="wake-form" class="wake-form">
          <label class="field">
            <span>MAC address</span>
            <input
              id="mac"
              name="mac"
              autocomplete="off"
              spellcheck="false"
              inputmode="text"
              placeholder="AA:BB:CC:DD:EE:FF"
              required>
          </label>

          <div class="form-grid">
            <label class="field">
              <span>Network interface</span>
              <select id="interface" name="interface"></select>
            </label>

            <label class="field port-field">
              <span>UDP port</span>
              <input id="port" name="port" type="number" min="1" max="65535" value="9">
            </label>
          </div>

          <div id="interface-detail" class="interface-detail" aria-live="polite"></div>

          <div class="actions">
            <button id="refresh" type="button" class="secondary">Refresh</button>
            <button id="wake" type="submit" class="primary">Wake On LAN</button>
          </div>

          <div id="status" class="status" role="status" aria-live="polite"></div>
        </form>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
